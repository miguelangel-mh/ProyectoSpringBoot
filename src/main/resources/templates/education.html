<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educación</title>
    <link rel="stylesheet" th:href="@{/css/entities.css}">
</head>
<body>

<div class="skills-container">
    <h1 class="skills-title">Rellene su formación</h1>

    <p class="skills-intro">
        En este apartado puede añadir su formación académica. Introduzca el título,
        el centro, las fechas y una breve descripción. Puede guardar tantas entradas como quiera.
    </p>

    <div class="progress-wrapper">
        <div class="progress-text">Paso 3 de 6 · Formación</div>
        <div class="progress-bar">
            <div class="progress-fill step-3"></div>
        </div>
    </div>

    <form th:action="@{/education/save}" th:object="${education}" method="post" class="skills-form">
        <input type="hidden" name="token" th:value="${token}">

        <div class="field-group">
            <label for="titulo" class="required-field">Título</label>
            <input type="text" id="titulo" th:field="*{titulo}" placeholder="Ej. Grado en Ingeniería Informática">
            <p class="field-error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></p>
        </div>

        <div class="field-group">
            <label for="centro" class="required-field">Centro</label>
            <input type="text" id="centro" th:field="*{centro}" placeholder="Ej. Universidad de Granada">
            <p class="field-error" th:if="${#fields.hasErrors('centro')}" th:errors="*{centro}"></p>
        </div>

        <div class="field-group">
            <label for="inicio" class="required-field">Fecha de inicio</label>
            <input type="date" id="inicio" th:field="*{inicio}">
            <p class="field-error" th:if="${#fields.hasErrors('inicio')}" th:errors="*{inicio}"></p>
        </div>

        <div class="field-group">
            <label for="fin">Fecha de finalización</label>
            <input type="date" id="fin" th:field="*{fin}">
            <p class="field-error" th:if="${#fields.hasErrors('fin')}" th:errors="*{fin}"></p>
        </div>

        <div class="field-group">
            <label for="descripcion" class="required-field">Descripción</label>
            <textarea id="descripcion" th:field="*{descripcion}" placeholder="Describe brevemente esta formación"></textarea>
            <p class="field-error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></p>
        </div>

        <p class="error-message next-error" th:if="${nextError}" th:text="${nextError}"></p>

        <div class="actions">
            <button type="submit" class="btn-primary">Añadir</button>

            <a th:href="@{/education/next(token=${token})}" class="btn-secondary">
                Siguiente →
            </a>
        </div>
    </form>

    <div class="saved-skills-box" th:if="${educationList != null and !#lists.isEmpty(educationList)}">
        <h2>Formación añadida</h2>

        <div class="skills-cards">
            <div class="skill-card" th:each="e : ${educationList}">
                <div class="skill-card-header">
                    <h3 th:text="${e.titulo}">Título</h3>
                    <span th:text="${e.inicio + ' - ' + (e.fin != null ? e.fin : 'Actualidad')}">Fechas</span>
                </div>

                <p><strong>Centro:</strong> <span th:text="${e.centro}">Centro</span></p>
                <p th:text="${e.descripcion}">Descripción</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
